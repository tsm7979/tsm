# Docker Compose Configuration for TSM Platform
# Version: 1.0.0
# Usage: docker-compose up -d

version: '3.8'

services:
  # TSM API Service
  tsm-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: tsm-api
    ports:
      - "8000:8000"
    environment:
      - TSM_ENVIRONMENT=development
      - TSM_DEBUG=true
      - TSM_SERVER_HOST=0.0.0.0
      - TSM_SERVER_PORT=8000
      - TSM_SERVER_WORKERS=2
      - TSM_CACHE_TYPE=redis
      - TSM_CACHE_HOST=redis
      - TSM_CACHE_PORT=6379
      - TSM_DATABASE_TYPE=postgres
      - TSM_DATABASE_HOST=postgres
      - TSM_DATABASE_PORT=5432
      - TSM_DATABASE_NAME=tsm
      - TSM_DATABASE_USER=tsm_user
      - TSM_DATABASE_PASSWORD=dev_password
      - TSM_SECURITY_JWT_SECRET=dev_jwt_secret_change_in_production
      - TSM_OBSERVABILITY_ENABLE_TRACING=true
      - TSM_OBSERVABILITY_ENABLE_METRICS=true
      - TSM_RESILIENCE_ENABLE_CIRCUIT_BREAKER=true
    depends_on:
      - postgres
      - redis
    networks:
      - tsm-network
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tsm-postgres
    environment:
      - POSTGRES_DB=tsm
      - POSTGRES_USER=tsm_user
      - POSTGRES_PASSWORD=dev_password
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tsm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsm_user -d tsm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tsm-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tsm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: tsm-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - tsm-network
    depends_on:
      - tsm-api
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: tsm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - tsm-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tsm-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - tsm-network
    restart: unless-stopped

  # RabbitMQ for message queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tsm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=tsm_user
      - RABBITMQ_DEFAULT_PASS=dev_password
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - tsm-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: tsm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - tsm-network
    depends_on:
      - tsm-api
    restart: unless-stopped

networks:
  tsm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  rabbitmq-data:
    driver: local
