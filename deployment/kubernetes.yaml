# Kubernetes Deployment Configuration for TSM Platform
# Version: 1.0.0

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: tsm-platform
  labels:
    name: tsm-platform
    environment: production

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: tsm-config
  namespace: tsm-platform
data:
  TSM_ENVIRONMENT: "production"
  TSM_DEBUG: "false"
  TSM_SERVER_HOST: "0.0.0.0"
  TSM_SERVER_PORT: "8000"
  TSM_SERVER_WORKERS: "4"
  TSM_CACHE_TYPE: "redis"
  TSM_CACHE_HOST: "redis-service"
  TSM_CACHE_PORT: "6379"
  TSM_DATABASE_TYPE: "postgres"
  TSM_DATABASE_HOST: "postgres-service"
  TSM_DATABASE_PORT: "5432"
  TSM_DATABASE_NAME: "tsm"
  TSM_OBSERVABILITY_ENABLE_TRACING: "true"
  TSM_OBSERVABILITY_ENABLE_METRICS: "true"
  TSM_RESILIENCE_ENABLE_CIRCUIT_BREAKER: "true"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: tsm-secrets
  namespace: tsm-platform
type: Opaque
stringData:
  TSM_DATABASE_USER: "tsm_user"
  TSM_DATABASE_PASSWORD: "change_this_password"
  TSM_SECURITY_JWT_SECRET: "change_this_jwt_secret"

---
# Deployment for TSM API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsm-api
  namespace: tsm-platform
  labels:
    app: tsm-api
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tsm-api
  template:
    metadata:
      labels:
        app: tsm-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: tsm-api
        image: tsm-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: tsm-config
        - secretRef:
            name: tsm-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: tsm-config

---
# Service for TSM API
apiVersion: v1
kind: Service
metadata:
  name: tsm-api-service
  namespace: tsm-platform
  labels:
    app: tsm-api
spec:
  type: ClusterIP
  selector:
    app: tsm-api
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP

---
# HorizontalPodAutoscaler for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tsm-api-hpa
  namespace: tsm-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tsm-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tsm-ingress
  namespace: tsm-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - api.tsm-platform.com
    secretName: tsm-tls-cert
  rules:
  - host: api.tsm-platform.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tsm-api-service
            port:
              number: 8000

---
# Redis for caching
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tsm-platform
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: tsm-platform
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: tsm-platform
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: tsm
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: tsm-secrets
              key: TSM_DATABASE_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tsm-secrets
              key: TSM_DATABASE_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: tsm-platform
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  clusterIP: None

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tsm-api-monitor
  namespace: tsm-platform
  labels:
    app: tsm-api
spec:
  selector:
    matchLabels:
      app: tsm-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tsm-api-pdb
  namespace: tsm-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: tsm-api

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tsm-network-policy
  namespace: tsm-platform
spec:
  podSelector:
    matchLabels:
      app: tsm-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
